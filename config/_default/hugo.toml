baseURL = "https://xiaolan.in/"
theme = "hugo-apero"
languageCode = "en"
title = "Xiaolan Xu"
author = "Xiaolan Xu"
copyright = ""
metaDataFormat = "yaml"
enableEmoji = true

[pagination]
  pagerSize = 5

ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_cache$", "\\.knit\\.md$", "\\.utf8\\.md$"]

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
    hardwraps = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    style = "github"

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[privacy]
  [privacy.googleAnalytics]
    disable = true
  [privacy.youtube]
    privacyEnhanced = true
