orgName = "NASA Jet Propulsion Laboratory"
orgLocal = "Pasadena, CA"
description = "Xiaolan Xu — Research Scientist at NASA JPL. Microwave remote sensing of the land surface: soil moisture, snow, and freeze-thaw."
favicon = "/img/favicon.ico"
logo = "/img/favicon.svg"  # header now shows site title text + this mark to its right (see layouts/partials/header.html override); same mark used site-wide (favicon, sidebar motif)
mainSections = ["blog", "project", "talk"]
navallcaps = true
socialInHeader = false
socialInFooter = true
sharing_image = "/img/profile.jpg"

# custom "earth" palette lives in assets/earth-hex.scss (theme must be empty for custom to apply)
# Earth Elements: Ivy Green primary · Earth Blue Darkest text · Mylar Gold highlights
theme = ""
custom_theme = "earth-hex"

# warm-geometric headings (Open Sauce One) + neutral body (Inter); self-hosted in static/fonts, @font-face in assets/custom.scss
customtextFontFamily = "Inter"
customheadingFontFamily = "Open Sauce One"
textFontFamily = ""
headingFontFamily = ""

comments = false

  [math]
    renderer = "katex"

  # Social / profile links are managed in data/social.yml (single source of truth,
  # used by both the homepage hero and the footer). Do not re-add [[social]] here.
