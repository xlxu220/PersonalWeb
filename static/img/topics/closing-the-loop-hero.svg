<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 390" width="880" height="390" role="img" aria-label="Closing the loop: Commercial AI and Physical Models, with the scientist between them">
  <rect width="880" height="390" fill="#F3F0E7"/>

  <g stroke="#D2CDBE" stroke-width="1.4" fill="none" opacity="0.8">
    <path d="M22 22 H58 M22 22 V58"/><path d="M858 22 H822 M858 22 V58"/>
    <path d="M22 368 H58 M22 368 V332"/><path d="M858 368 H822 M858 368 V332"/>
    <circle cx="440" cy="30" r="4"/><circle cx="440" cy="360" r="4"/>
    <circle cx="120" cy="40" r="3.5"/><circle cx="760" cy="40" r="3.5"/>
    <circle cx="120" cy="350" r="3.5"/><circle cx="760" cy="350" r="3.5"/>
  </g>

  <path d="M440 195 C 440 78, 120 78, 120 195 C 120 312, 440 312, 440 195" fill="none" stroke="#8FA06E" stroke-width="20" stroke-linecap="round"/>
  <path d="M440 195 C 440 78, 760 78, 760 195 C 760 312, 440 312, 440 195" fill="none" stroke="#4C5666" stroke-width="20" stroke-linecap="round"/>
  <path d="M440 195 C 440 78, 120 78, 120 195 C 120 312, 440 312, 440 195" fill="none" stroke="#CBD3B7" stroke-width="2" stroke-dasharray="7 8"/>
  <path d="M440 195 C 440 78, 760 78, 760 195 C 760 312, 440 312, 440 195" fill="none" stroke="#9AA1AC" stroke-width="2" stroke-dasharray="7 8"/>

  <g fill="#F3F0E7" stroke="#6E7E52" stroke-width="2.5">
    <rect x="96" y="171" width="48" height="48" rx="9"/><rect x="107" y="182" width="26" height="26" rx="4" fill="none"/>
  </g>
  <g fill="#F3F0E7" stroke="#3C4654" stroke-width="2.5">
    <rect x="736" y="171" width="48" height="48" rx="9"/><rect x="747" y="182" width="26" height="26" rx="4" fill="none"/>
  </g>
  <polygon points="168,195 156,189 156,201" fill="#6E7E52"/>
  <polygon points="712,195 724,189 724,201" fill="#3C4654"/>

  <line x1="440" y1="158" x2="440" y2="104" stroke="#C25E22" stroke-width="1.5" opacity="0.75"/>
  <circle cx="440" cy="104" r="3.2" fill="#C25E22"/>
  <circle cx="440" cy="195" r="33" fill="#E8853C" opacity="0.16"/>
  <circle cx="440" cy="195" r="19" fill="#E8853C" stroke="#B85A22" stroke-width="2.5"/>
  <circle cx="440" cy="195" r="7.5" fill="#F4B07A"/>
  <g stroke="#C25E22" stroke-width="3" stroke-linecap="round">
    <line x1="440" y1="176" x2="440" y2="166"/><line x1="440" y1="214" x2="440" y2="224"/>
    <line x1="421" y1="195" x2="411" y2="195"/><line x1="459" y1="195" x2="469" y2="195"/>
  </g>

  <g font-family="'DejaVu Sans Mono',monospace" font-size="15" fill="#3a3f37" text-anchor="middle">
    <text x="440" y="46">The scientist stands between them.</text>
    <text x="440" y="68">A real process we haven't modeled yet —</text>
    <text x="440" y="90">or an AI hallucination?</text>
  </g>

  <text x="248" y="182" font-family="'Open Sauce One',system-ui,sans-serif" font-size="26" font-weight="700" fill="#2b2f26" text-anchor="middle">Commercial AI</text>
  <g font-family="'DejaVu Sans Mono',monospace" font-size="14" fill="#5b6053" text-anchor="middle">
    <text x="248" y="208">Fuses Earth data at scale —</text>
    <text x="248" y="227">finding emergent patterns</text>
    <text x="248" y="246">with no physics assumed.</text>
  </g>

  <text x="632" y="182" font-family="'Open Sauce One',system-ui,sans-serif" font-size="26" font-weight="700" fill="#2b2f26" text-anchor="middle">Physical Models</text>
  <g font-family="'DejaVu Sans Mono',monospace" font-size="14" fill="#5b6053" text-anchor="middle">
    <text x="632" y="208">Tests those patterns against</text>
    <text x="632" y="227">conservation laws and</text>
    <text x="632" y="246">process constraints.</text>
  </g>
</svg>
